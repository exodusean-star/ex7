<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nginx 테스트 페이지</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
        }
        p {
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .success-icon {
            font-size: 3rem;
            color: #27ae60;
            margin-bottom: 1rem;
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✔</div>
        <h1>Nginx 작동 확인!</h1>
        <p>
            축하합니다! 이 메시지가 보인다면 Nginx 웹 서버가 성공적으로 설치되었고 작동 중입니다.<br>
            이것은 기본 index.html 파일입니다.
        </p>
        <p>
            추가적인 구성이 필요합니다.
        </p>
        <div class="footer">
            <em>Nginx Server Test Page</em>
        </div>
    </div>
</body>
</html>
